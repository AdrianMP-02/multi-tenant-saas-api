services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: saas-api-prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - saas-network

  db:
    image: postgres:16-alpine
    container_name: saas-db-prod
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saas_pass}
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    container_name: saas-redis-prod
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - saas-network

volumes:
  pgdata:

networks:
  saas-network:
    driver: bridge
